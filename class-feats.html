<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Class Feats — Pathfinder 2</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="container">
    <h1>Справочник class feats</h1>
    <nav class="nav">
      <a href="index.html">Главная</a>
      <a href="character.html">Персонажи</a>
      <a href="ancestries.html">Происхождения</a>
      <a href="ancestry-feats.html">Черты происхождения</a>
      <a href="backgrounds.html">Background</a>
      <a class="active" href="class-feats.html">Class Feats</a>
      <a href="monster.html">Монстры</a>
      <a href="game.html">Игры</a>
    </nav>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Class Feats</h2>
      <form id="classFeatForm" class="grid">
        <input type="hidden" id="classFeatId" />
        <div class="form-grid">
          <div><label>Код</label><input id="classFeatCode" required /></div>
          <div><label>Название</label><input id="classFeatName" required /></div>
          <div><label>Class</label><select id="classFeatClassId"></select></div>
          <div><label>Мин. уровень</label><input id="classFeatLevel" type="number" min="1" max="20" value="1" /></div>
          <div style="grid-column: 1 / -1;"><label>Описание</label><textarea id="classFeatDescription"></textarea></div>
          <div style="grid-column: 1 / -1;"><label>Источник</label><input id="classFeatSource" placeholder="Player Core pg. ..." /></div>
        </div>
        <div class="row">
          <button class="primary" type="submit">Сохранить class feat</button>
          <button class="ghost" id="classFeatReset" type="button">Сброс</button>
        </div>
      </form>
      <div id="classFeatList" class="list"></div>
    </section>
  </main>

  <script src="app.js"></script>
  <script src="data/registry.js"></script>
  <script src="data/ancestries/load-all.js"></script>
  <script src="data/ancestry-feats/load-all.js"></script>
  <script src="data/classes/load-all.js"></script>
  <script src="data/backgrounds/load-all.js"></script>
  <script src="data/archetypes/load-all.js"></script>
  <script src="data/class-feats/load-all.js"></script>
  <script src="rules-data.js"></script>
  <script src="class-feats.js"></script>
</body>
</html>
