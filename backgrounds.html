<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Background — Pathfinder 2</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="container">
    <h1>Справочник background</h1>
    <nav class="nav">
      <a href="index.html">Главная</a>
      <a href="character.html">Персонажи</a>
      <a href="ancestries.html">Происхождения</a>
      <a href="ancestry-feats.html">Черты происхождения</a>
      <a class="active" href="backgrounds.html">Background</a>
      <a href="class-feats.html">Class Feats</a>
      <a href="monster.html">Монстры</a>
      <a href="game.html">Игры</a>
    </nav>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Background</h2>
      <form id="backgroundForm" class="grid">
        <input type="hidden" id="backgroundId" />
        <div class="form-grid">
          <div><label>Код</label><input id="backgroundCode" required /></div>
          <div><label>Название</label><input id="backgroundName" required /></div>
          <div><label>Boost options (через запятую)</label><input id="backgroundBoostOptionsInput" placeholder="INT, WIS" /></div>
          <div><label>Free boost count</label><input id="backgroundFreeBoostCountInput" type="number" min="0" value="1" /></div>
          <div style="grid-column: 1 / -1;"><label>Выдаваемая черта (название)</label><input id="backgroundFeatNameInput" placeholder="Student of the Canon" /></div>
        </div>
        <div class="row">
          <button class="primary" type="submit">Сохранить background</button>
          <button class="ghost" id="backgroundReset" type="button">Сброс</button>
        </div>
      </form>
      <div id="backgroundList" class="list"></div>
    </section>
  </main>

  <script src="app.js"></script>
  <script src="data/registry.js"></script>
  <script src="data/ancestries/load-all.js"></script>
  <script src="data/ancestry-feats/load-all.js"></script>
  <script src="data/classes/load-all.js"></script>
  <script src="data/backgrounds/load-all.js"></script>
  <script src="data/archetypes/load-all.js"></script>
  <script src="data/class-feats/load-all.js"></script>
  <script src="rules-data.js"></script>
  <script src="backgrounds.js"></script>
</body>
</html>
